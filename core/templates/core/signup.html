{% extends 'core/base.html' %}

{% block title %}Sign Up{% endblock %}

{% block content %}

<div class="container mx-auto px-4 mt-6">
    <!-- Minimal Card -->
    <div class="max-w-md mx-auto bg-white border border-gray-200 rounded-lg shadow-sm">
        <!-- Header -->
        <div class="text-center px-8 py-6 border-b border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800">Create Account</h2>
            <p class="text-gray-500 text-sm mt-1">It's quick and easy</p>
        </div>

        <!-- Form -->
        <form action="" method="POST" class="p-8">
            {% csrf_token %}

            {% if error_signup %}
            <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-2 rounded-md text-sm mb-4">
                {{ error_signup }}
            </div>
            {% endif %}

            <div class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-600">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" class="w-full border border-gray-200 rounded-md px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-base-2 mt-1" required>
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-600">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter email" class="w-full border border-gray-200 rounded-md px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-base-2 mt-1" required>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-600">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" class="w-full border border-gray-200 rounded-md px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-base-2 mt-1" required>
                </div>

                <div>
                    <label for="repeatpassword" class="block text-sm font-medium text-gray-600">Confirm Password</label>
                    <input type="password" id="repeatpassword" name="repeatpassword" placeholder="Confirm password" class="w-full border border-gray-200 rounded-md px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-base-2 mt-1" required>
                </div>

                <div>
                    <label for="user_type" class="block text-sm font-medium text-gray-600">Register as</label>
                    <select id="user_type" name="user_type" class="w-full border border-gray-200 rounded-md px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-base-2 mt-1 bg-white">
                        <option value="buyer" selected>Buyer</option>
                        <option value="seller">Seller</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="w-full bg-base-2 hover:bg-base-1 text-white font-semibold py-2.5 rounded-md mt-6 transition-colors">
                Sign Up
            </button>

            <p class="text-center text-gray-500 text-sm mt-4">
                Already have an account?
                <a href="{% url 'core:login' %}" class="text-base-1 hover:text-teal-700 font-medium">Login</a>
            </p>
        </form>
    </div>
</div>

{% endblock %}
