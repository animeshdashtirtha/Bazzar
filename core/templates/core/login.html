{% extends 'core/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="container mx-auto px-4 mt-6">
    <!-- Minimal Card -->
    <div class="max-w-md mx-auto bg-white border border-gray-200 rounded-lg shadow-sm">
        <!-- Header -->
        <div class="text-center px-8 py-6 border-b border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800">Sign In</h2>
            <p class="text-gray-500 text-sm mt-1">Welcome back!</p>
        </div>

        <!-- Form -->
        <form action="" method="POST" class="p-8">
            {% csrf_token %}

            {% if error_login %}
            <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-2 rounded-md text-sm mb-4">
                {{ error_login }}
            </div>
            {% endif %}

            <div class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-600">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" class="w-full border border-gray-200 rounded-md px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-base-2 mt-1">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-600">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" class="w-full border border-gray-200 rounded-md px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-base-2 mt-1">
                </div>
            </div>

            <button type="submit" class="w-full bg-base-2 hover:bg-base-1 text-white font-semibold py-2.5 rounded-md mt-6 transition-colors">
                Login
            </button>

            <p class="text-center text-gray-500 text-sm mt-4">
                Don't have an account?
                <a href="{% url 'core:signup' %}" class="text-base-1 hover:text-teal-700 font-medium">Sign up</a>
            </p>
        </form>
    </div>
</div>

{% endblock %}
